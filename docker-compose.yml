services:
  app:
    build: .
    container_name: whatsapp-tools
    depends_on:
      - mysql
      - redis
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://root:root@mysql:3306/whatsapp
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me-in-production
    command: sh -c "npx prisma migrate deploy && npm run dev"

  mysql:
    image: mysql:8.4

    container_name: whatsapp_mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: whatsapp

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7

    container_name: whatsapp_redis

    ports:
      - "6379:6379"

volumes:
  mysql_data: